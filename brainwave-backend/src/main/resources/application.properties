# Spring Boot 應用設定
spring.application.name=brainwave-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# 伺服器設定
server.port=${SERVER_PORT:8080}
# 啟動 log 顯示的 API 根網址（選填；Zeabur 等部署時可設 APP_STARTUP_API_BASE_URL；綁定至 AppStartupProperties）
app.startup.api-base-url=${APP_STARTUP_API_BASE_URL:}

# JPA/Hibernate 共用預設（交由 Flyway 管理 schema，實際連線由 profile 決定）
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway migration（基礎）
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# 最小認證 mock 設定（開發用途）
app.auth.demo.username=${APP_AUTH_DEMO_USERNAME:demo}
app.auth.demo.password=${APP_AUTH_DEMO_PASSWORD:demo}
# 前台會員登入（可與後台分開設定）
app.auth.front.demo.username=${APP_AUTH_FRONT_DEMO_USERNAME:demo}
app.auth.front.demo.password=${APP_AUTH_FRONT_DEMO_PASSWORD:demo}
app.auth.guard.enabled=${APP_AUTH_GUARD_ENABLED:true}
# JWT（僅在 spring.profiles.active=jwt 時使用；secret 至少 32 字元，HS256）
# app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:}

# CORS（逗號分隔來源白名單）
# 提醒：這裡要填「前端網域」，不是後端 API 網域
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}

# Storage（先提供配置骨架；實際行為待 StorageService 接入）
app.storage.provider=${APP_STORAGE_PROVIDER:local}
app.storage.local.base-path=${APP_STORAGE_LOCAL_BASE_PATH:./uploads}
app.storage.local.public-base-url=${APP_STORAGE_LOCAL_PUBLIC_BASE_URL:}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}

# Audit（先提供配置骨架；實際行為待 Audit Log 接入）
app.audit.enabled=${APP_AUDIT_ENABLED:false}
app.audit.sink=${APP_AUDIT_SINK:console}
app.audit.include-request-body=${APP_AUDIT_INCLUDE_REQUEST_BODY:false}
app.audit.include-response-body=${APP_AUDIT_INCLUDE_RESPONSE_BODY:false}
app.audit.max-body-length=${APP_AUDIT_MAX_BODY_LENGTH:2048}
app.audit.mask-fields=${APP_AUDIT_MASK_FIELDS:password,token,authorization}

# OpenAPI（springdoc）
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# HTTP 請求日誌設定
logging.level.org.springframework.web=INFO
logging.level.com.brainwave.backend=INFO
# %X{requestId} 由 CorrelationIdFilter 寫入 MDC，方便依請求追蹤日誌
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n
