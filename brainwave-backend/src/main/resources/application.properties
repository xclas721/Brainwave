# Spring Boot 應用設定
spring.application.name=brainwave-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# 伺服器設定
server.port=${SERVER_PORT:8080}

# JPA/Hibernate 共用預設（交由 Flyway 管理 schema，實際連線由 profile 決定）
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway migration（基礎）
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# 最小認證 mock 設定（開發用途）
app.auth.demo.username=${APP_AUTH_DEMO_USERNAME:demo}
app.auth.demo.password=${APP_AUTH_DEMO_PASSWORD:demo}
# 前台會員登入（可與後台分開設定）
app.auth.front.demo.username=${APP_AUTH_FRONT_DEMO_USERNAME:demo}
app.auth.front.demo.password=${APP_AUTH_FRONT_DEMO_PASSWORD:demo}
app.auth.guard.enabled=${APP_AUTH_GUARD_ENABLED:true}

# CORS（逗號分隔來源白名單）
# 提醒：這裡要填「前端網域」，不是後端 API 網域
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}

# HTTP 請求日誌設定
logging.level.org.springframework.web=INFO
logging.level.com.brainwave.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
