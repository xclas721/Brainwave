# Spring Boot 應用設定
spring.application.name=brainwave-backend

# 資料庫設定
spring.datasource.url=jdbc:mysql://localhost:3306/brainwave?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 伺服器設定
server.port=8080

# JPA/Hibernate 設定
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# HTTP 請求日誌設定
logging.level.org.springframework.web=DEBUG
logging.level.com.brainwave.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
