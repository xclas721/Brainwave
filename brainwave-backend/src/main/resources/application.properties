# Spring Boot 應用設定
spring.application.name=brainwave-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 伺服器設定
server.port=${SERVER_PORT:8080}

# 資料庫設定（正式環境請透過環境變數注入）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/brainwave?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate 共用預設
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 最小認證 mock 設定（開發用途）
app.auth.demo.username=${APP_AUTH_DEMO_USERNAME:demo}
app.auth.demo.password=${APP_AUTH_DEMO_PASSWORD:demo}
# 前台會員登入（可與後台分開設定）
app.auth.front.demo.username=${APP_AUTH_FRONT_DEMO_USERNAME:demo}
app.auth.front.demo.password=${APP_AUTH_FRONT_DEMO_PASSWORD:demo}

# HTTP 請求日誌設定
logging.level.org.springframework.web=INFO
logging.level.com.brainwave.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
