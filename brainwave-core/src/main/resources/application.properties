# Core 模組設定（避免硬編碼機密，統一走環境變數）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/brainwave?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate 共用預設
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 日誌設定
logging.level.com.brainwave=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
